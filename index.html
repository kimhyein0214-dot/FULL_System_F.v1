<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FULL_System_F.v1 Picking</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.css">
    <link rel="stylesheet" href="src/styles/picking.css?v=20260630-fastnav1">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">PK</span>
          <div>
            <h1>피킹 시스템 F.v1</h1>
            <p>피킹탭 단독 이식 테스트</p>
          </div>
        </div>
        <div class="toolbar">
          <button id="refresh-btn" class="btn">새로고침</button>
          <input id="date-input" class="date-input" type="date">
          <button id="today-btn" class="btn">오늘</button>
          <div class="segmented" aria-label="접수 구분">
            <button class="seg active" data-session="ALL">전체</button>
            <button class="seg" data-session="AM">오전</button>
            <button class="seg" data-session="PM">오후</button>
          </div>
          <button id="sort-toggle" class="btn primary">작업순서</button>
        </div>
      </header>

      <section class="status-strip">
        <div class="metric"><span>주문</span><strong id="metric-orders">0</strong></div>
        <div class="metric good"><span>피킹완료</span><strong id="metric-picked">0</strong></div>
        <div class="metric danger"><span>부족항목</span><strong id="metric-shortage">0</strong></div>
        <div class="metric warn"><span>보류</span><strong id="metric-hold">0</strong></div>
        <div class="metric muted"><span>쓰기</span><strong id="metric-write">OFF</strong></div>
        <div class="metric muted"><span>이벤트</span><strong id="metric-events">OFF</strong></div>
      </section>

      <section class="progress-panel">
        <div class="progress-label"><strong id="current-group-label">1조</strong><span id="progress-text">0/0 완료</span></div>
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      </section>

      <main class="main-grid">
        <aside class="sidebar">
          <nav class="tabs">
            <button class="tab active" data-app-tab="picking">피킹</button>
            <button class="tab" data-app-tab="dashboard">대시보드</button>
          </nav>
          <div class="side-section">
            <div class="side-title">조 이동</div>
            <div id="group-list" class="group-list"></div>
          </div>
          <div class="side-jumps">
            <div class="side-title">빠른 이동</div>
            <div class="jump-row">
              <label for="jump-group-input">조</label>
              <input id="jump-group-input" class="jump-input" inputmode="numeric" placeholder="-">
              <button id="jump-group-btn" class="jump-btn" type="button">→</button>
            </div>
            <div class="jump-row">
              <label for="jump-seq-input">순서#</label>
              <input id="jump-seq-input" class="jump-input" inputmode="numeric" placeholder="-">
              <button id="jump-seq-btn" class="jump-btn" type="button">→</button>
            </div>
            <div class="jump-row">
              <label for="jump-invoice-input">송장#</label>
              <input id="jump-invoice-input" class="jump-input" inputmode="numeric" placeholder="13자리">
              <button id="jump-invoice-btn" class="jump-btn" type="button">→</button>
            </div>
          </div>
        </aside>

        <section id="picking-panel" class="work-panel">
          <div class="panel-head">
            <div>
              <h2 id="panel-title">자사코드별 주문서</h2>
              <p id="panel-subtitle">데이터 로딩 중</p>
            </div>
            <div class="panel-tools">
              <div id="filter-bar" class="filter-bar" aria-label="피킹 필터">
                <button class="filter-chip active" data-filter="all">전체</button>
                <button class="filter-chip" data-filter="todo">미완료</button>
                <button class="filter-chip" data-filter="shortage">미송</button>
                <button class="filter-chip" data-filter="nodrawer">서랍없음</button>
                <button class="filter-chip" data-filter="gold">골드</button>
                <button class="filter-chip" data-filter="hold">보류</button>
                <button class="filter-chip" data-filter="done">완료</button>
              </div>
              <input id="search-input" class="search" placeholder="송장번호 / 자사코드 / 주문자 / 수취인">
            </div>
          </div>
          <div id="order-list" class="order-list"></div>
        </section>

        <section id="dashboard-panel" class="dashboard-panel" hidden>
          <div class="panel-head">
            <div>
              <h2>대시보드</h2>
              <p>피킹 보조 기능과 현황을 분리해서 관리합니다.</p>
            </div>
          </div>
          <div class="dashboard-body">
            <div id="dashboard-summary" class="dashboard-summary"></div>
            <div class="dashboard-card">
              <h3>내보내기 / 보조 기능</h3>
              <div class="dashboard-actions">
                <button class="btn" disabled>토글 CSV</button>
                <button class="btn" disabled>보강현황</button>
                <button class="btn" disabled>주문리스트</button>
              </div>
              <p>운영 화면이 복잡해지지 않도록 보조 버튼은 이 탭으로 옮길 예정입니다.</p>
            </div>
          </div>
        </section>
      </main>

      <section id="bottom-tray" class="bottom-tray">
        <button id="tray-handle" class="tray-handle" type="button" aria-expanded="false">
          <span class="tray-line"></span>
          <span id="tray-label">조별 상품 슬롯</span>
          <span id="tray-count">0/0</span>
          <span class="tray-line"></span>
        </button>
        <div class="tray-content">
          <div class="tray-toolbar">
            <strong id="tray-title">현재 조 상품</strong>
            <button id="tray-expand-btn" class="tray-expand-btn" type="button">펼치기</button>
          </div>
          <div id="tray-board" class="tray-board"></div>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="src/app/pickingApp.mjs?v=20260630-fastnav1"></script>
  </body>
</html>
